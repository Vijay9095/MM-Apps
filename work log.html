<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Daily Work Log</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F4F3FF; min-height: 100vh; padding: 2rem 1rem; }
  .app { max-width: 820px; margin: 0 auto; }

  .top-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid #E8E6FC; }
  .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: #7F77DD; flex-shrink: 0; }
  .top-bar h1 { font-size: 18px; font-weight: 600; color: #26215C; letter-spacing: -0.2px; }

  .form-card { background: #FAFAFE; border: 1px solid #E8E6FC; border-radius: 14px; padding: 1.25rem; margin-bottom: 1.5rem; }
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .field label { font-size: 11px; font-weight: 600; color: #534AB7; letter-spacing: 0.5px; text-transform: uppercase; }
  .field input, .field textarea {
    border: 1px solid #CECBF6; border-radius: 8px; padding: 10px 12px;
    font-size: 14px; background: #fff; color: #26215C; outline: none;
    font-family: inherit; transition: border-color 0.15s, box-shadow 0.15s;
  }
  .field input:focus, .field textarea:focus { border-color: #7F77DD; box-shadow: 0 0 0 3px #EEEDFE; }
  .field textarea { resize: vertical; min-height: 86px; line-height: 1.5; }
  .char-count { font-size: 11px; color: #AFA9EC; text-align: right; margin-top: 3px; }

  .btn-save {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; margin-top: 14px; padding: 12px; background: #7F77DD;
    color: #fff; border: none; border-radius: 9px; font-size: 14px;
    font-weight: 600; cursor: pointer; transition: background 0.15s, transform 0.1s;
  }
  .btn-save:hover { background: #534AB7; }
  .btn-save:active { transform: scale(0.98); }

  .table-card { background: #fff; border: 1px solid #E8E6FC; border-radius: 14px; overflow: hidden; }
  .table-head-row { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem; border-bottom: 1px solid #eef0f6; gap: 10px; flex-wrap: wrap; }
  .table-head-row h2 { font-size: 14px; font-weight: 600; color: #26215C; }
  .head-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .pill { background: #EEEDFE; color: #534AB7; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }

  .btn-delete-all {
    display: flex; align-items: center; gap: 5px;
    background: #fff0f0; color: #A32D2D; border: 1px solid #F7C1C1;
    border-radius: 7px; padding: 5px 11px; font-size: 11px; font-weight: 600;
    cursor: pointer; transition: background 0.15s; white-space: nowrap;
  }
  .btn-delete-all:hover { background: #FCEBEB; border-color: #F09595; }
  .btn-delete-all:active { transform: scale(0.97); }

  .btn-wa-all {
    display: flex; align-items: center; gap: 6px;
    background: #e9faf0; color: #085041; border: 1px solid #5DCAA5;
    border-radius: 7px; padding: 5px 13px; font-size: 11px; font-weight: 600;
    cursor: pointer; transition: background 0.15s; white-space: nowrap;
  }
  .btn-wa-all:hover { background: #d1f5e3; border-color: #1D9E75; }
  .btn-wa-all:active { transform: scale(0.97); }

  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  col.c-sno   { width: 52px; }
  col.c-title { width: 200px; }
  col.c-sum   { width: auto; }
  col.c-act   { width: 72px; }
  th {
    padding: 9px 14px; text-align: left; font-size: 11px; font-weight: 600;
    color: #888780; letter-spacing: 0.4px; text-transform: uppercase;
    background: #fafafc; border-bottom: 1px solid #eef0f6;
  }
  th.center { text-align: center; }
  td {
    padding: 10px 14px; border-bottom: 1px solid #f5f5f8;
    vertical-align: middle; word-break: break-word;
    font-family: 'Open Sans', sans-serif; font-size: 12px; color: #2C2C2A;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafaff; }
  .sno-cell { text-align: center; font-weight: 600; color: #7F77DD; }
  .title-cell { font-weight: 600; color: #26215C; }
  .sum-cell { color: #5F5E5A; line-height: 1.7; }
  .act-cell { text-align: center; }

  .btn-copy-row {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 7px;
    background: #F4F3FF; border: 1px solid #CECBF6;
    cursor: pointer; transition: background 0.15s;
  }
  .btn-copy-row:hover { background: #EEEDFE; border-color: #AFA9EC; }
  .btn-copy-row:active { transform: scale(0.93); }

  .empty { padding: 3rem; text-align: center; }
  .empty-circle { width: 48px; height: 48px; border-radius: 50%; background: #EEEDFE; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; }
  .empty p { font-size: 13px; color: #888780; }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(38,33,92,0.2); z-index: 50; align-items: center; justify-content: center; }
  .overlay.show { display: flex; }
  .confirm-box { background: #fff; border-radius: 14px; border: 1px solid #E8E6FC; padding: 1.75rem 1.5rem; max-width: 320px; width: 90%; text-align: center; }
  .confirm-box h3 { font-size: 15px; font-weight: 600; color: #26215C; margin-bottom: 8px; }
  .confirm-box p { font-size: 13px; color: #5F5E5A; margin-bottom: 1.5rem; line-height: 1.6; }
  .confirm-actions { display: flex; gap: 10px; }
  .btn-cancel { flex: 1; padding: 10px; background: #F4F3FF; color: #534AB7; border: 1px solid #CECBF6; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-cancel:hover { background: #EEEDFE; }
  .btn-confirm-del { flex: 1; padding: 10px; background: #E24B4A; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-confirm-del:hover { background: #A32D2D; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 600;
    color: #fff; opacity: 0; transition: opacity 0.25s; pointer-events: none;
    white-space: nowrap; z-index: 99;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="app">

  <div class="top-bar">
    <div class="logo-dot"></div>
    <h1>Daily Work Log</h1>
  </div>

  <div class="form-card">
    <div class="field">
      <label for="inp-title">Task Title</label>
      <input type="text" id="inp-title" placeholder="Enter task title..." maxlength="80" />
    </div>
    <div class="field">
      <label for="inp-summary">Summary</label>
      <textarea id="inp-summary" placeholder="Describe what you did or need to do..." maxlength="300"></textarea>
      <div class="char-count"><span id="char-left">300</span> chars left</div>
    </div>
    <button class="btn-save" onclick="saveEntry()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M13.5 4.5L11 2H2.5A.5.5 0 0 0 2 2.5v11a.5.5 0 0 0 .5.5h11a.5.5 0 0 0 .5-.5V5l-0.5-.5Z" stroke="#fff" stroke-width="1.2" stroke-linejoin="round"/>
        <path d="M10.5 13.5v-4h-5v4M5.5 2v3.5h5" stroke="#fff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Save Entry
    </button>
  </div>

  <div class="table-card">
    <div class="table-head-row">
      <h2>Work Entries</h2>
      <div class="head-right">
        <span class="pill" id="count-pill">0 entries</span>
        <button class="btn-wa-all" onclick="sendAllWhatsApp()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.477 2 12c0 1.89.528 3.655 1.444 5.163L2 22l4.956-1.417A9.955 9.955 0 0 0 12 22c5.523 0 10-4.477 10-10S17.523 2 12 2Z" fill="#25D366"/>
            <path d="M8.5 9.5c.1.7.5 1.9 1.7 3.1 1.3 1.3 2.5 1.7 3.2 1.8.4.05.8-.1 1.1-.4l.4-.4c.2-.2.2-.5 0-.7l-1.1-1.1c-.2-.2-.5-.2-.7 0l-.35.35c-.1.1-.25.12-.38.05-.5-.27-1.35-.97-1.75-1.37-.4-.4-1.05-1.2-1.3-1.72a.29.29 0 0 1 .05-.36L9.7 8.6c.2-.2.2-.5 0-.7L8.6 6.8c-.2-.2-.5-.2-.7 0l-.4.4c-.3.3-.45.7-.4 1.1.05.4.2 1 .4 1.2Z" fill="#fff"/>
          </svg>
          Send All via WhatsApp
        </button>
        <button class="btn-delete-all" onclick="confirmDeleteAll()">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 4h12M5.5 4V2.5h5V4M6.5 7v5M9.5 7v5M3 4l.8 9.5A1 1 0 0 0 4.8 14.5h6.4a1 1 0 0 0 1-.95L13 4" stroke="#A32D2D" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Delete All
        </button>
      </div>
    </div>
    <div class="tbl-wrap">
      <table id="log-table">
        <colgroup>
          <col class="c-sno"><col class="c-title"><col class="c-sum"><col class="c-act">
        </colgroup>
        <thead>
          <tr>
            <th class="center">S.No</th>
            <th>Title</th>
            <th>Summary</th>
            <th class="center">Copy</th>
          </tr>
        </thead>
        <tbody id="log-body"></tbody>
      </table>
      <div class="empty" id="empty-state" style="display:none;">
        <div class="empty-circle">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="5" width="18" height="16" rx="2" stroke="#7F77DD" stroke-width="1.5"/>
            <path d="M8 3v4M16 3v4M3 10h18" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M8 14h4M8 17h8" stroke="#AFA9EC" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <p>No entries yet. Add a task above to get started.</p>
      </div>
    </div>
  </div>

</div>

<div class="overlay" id="confirm-overlay">
  <div class="confirm-box">
    <h3>Delete All Entries?</h3>
    <p>This will permanently remove all work log entries. This action cannot be undone.</p>
    <div class="confirm-actions">
      <button class="btn-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="btn-confirm-del" onclick="deleteAll()">Delete All</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'worklog_entries';
  let entries = [];

  function loadEntries() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) entries = JSON.parse(raw);
    } catch(e) { entries = []; }
    render();
  }

  function saveEntry() {
    const title = document.getElementById('inp-title').value.trim();
    const summary = document.getElementById('inp-summary').value.trim();
    if (!title) { showToast('Please enter a task title.', '#A32D2D'); return; }
    if (!summary) { showToast('Please enter a summary.', '#A32D2D'); return; }
    entries.push({ title, summary });
    persist();
    document.getElementById('inp-title').value = '';
    document.getElementById('inp-summary').value = '';
    document.getElementById('char-left').textContent = '300';
    render();
    showToast('Entry saved successfully!', '#0F6E56');
  }

  function buildAllText() {
    let msg = '';
    entries.forEach((e, i) => {
      msg += `${i + 1}. ${e.summary}\n`;
    });
    return msg.trim();
  }

  function sendAllWhatsApp() {
    if (entries.length === 0) { showToast('No entries to send.', '#854F0B'); return; }
    const text = encodeURIComponent(buildAllText());
    window.open(`https://wa.me/?text=${text}`, '_blank');
  }

  function copyRow(i) {
    const e = entries[i];
    const text = `${i + 1}. ${e.summary}`;
    navigator.clipboard.writeText(text).then(() => {
      showToast('Copied!', '#534AB7');
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
      showToast('Copied!', '#534AB7');
    });
  }

  function confirmDeleteAll() {
    if (entries.length === 0) { showToast('No entries to delete.', '#854F0B'); return; }
    document.getElementById('confirm-overlay').classList.add('show');
  }

  function closeConfirm() {
    document.getElementById('confirm-overlay').classList.remove('show');
  }

  function deleteAll() {
    entries = []; persist(); render(); closeConfirm();
    showToast('All entries deleted.', '#A32D2D');
  }

  function persist() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); } catch(e) {}
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function render() {
    const body = document.getElementById('log-body');
    const pill = document.getElementById('count-pill');
    const empty = document.getElementById('empty-state');
    const table = document.getElementById('log-table');
    pill.textContent = entries.length + (entries.length === 1 ? ' entry' : ' entries');
    if (entries.length === 0) {
      table.style.display = 'none'; empty.style.display = 'block';
    } else {
      table.style.display = ''; empty.style.display = 'none';
    }
    body.innerHTML = entries.map((e, i) => `
      <tr>
        <td class="sno-cell">${i + 1}</td>
        <td class="title-cell">${esc(e.title)}</td>
        <td class="sum-cell">${esc(e.summary)}</td>
        <td class="act-cell">
          <button class="btn-copy-row" onclick="copyRow(${i})" title="Copy this entry">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="5.5" y="5.5" width="8" height="9" rx="1.2" stroke="#534AB7" stroke-width="1.2"/>
              <path d="M3.5 10.5H2.8A1.3 1.3 0 0 1 1.5 9.2V2.8A1.3 1.3 0 0 1 2.8 1.5h6.4a1.3 1.3 0 0 1 1.3 1.3v.7" stroke="#534AB7" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
          </button>
        </td>
      </tr>`
    ).join('');
  }

  let toastTimer;
  function showToast(msg, bg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.style.background = bg || '#26215C';
    t.classList.add('show'); clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  document.getElementById('inp-summary').addEventListener('input', function() {
    document.getElementById('char-left').textContent = 300 - this.value.length;
  });
  document.getElementById('inp-title').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('inp-summary').focus(); }
  });
  document.getElementById('confirm-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeConfirm();
  });

  loadEntries();
</script>

</body>
</html>
