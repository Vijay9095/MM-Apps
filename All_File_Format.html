<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>XLS/XLSX ↔ CSV ↔ JSON ↔ PDF/Image Converter</title>

<!-- Libraries -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.19.2/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: #f1f5f9;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  padding: 20px;
}
h1 {
  color: #38bdf8;
  text-align: center;
}
.container {
  background: #1e293b;
  border-radius: 12px;
  padding: 24px;
  width: 95%;
  max-width: 800px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.4);
}
.drop-zone {
  border: 2px dashed #38bdf8;
  border-radius: 10px;
  padding: 30px;
  text-align: center;
  cursor: pointer;
  transition: background 0.3s;
}
.drop-zone.dragover {
  background: rgba(56,189,248,0.1);
}
button {
  background: linear-gradient(90deg, #38bdf8, #818cf8);
  border: none;
  padding: 10px 18px;
  margin: 6px;
  border-radius: 8px;
  color: #0f172a;
  font-weight: bold;
  cursor: pointer;
  transition: transform 0.2s;
}
button:hover { transform: scale(1.05); }
pre {
  background: #0f172a;
  padding: 12px;
  border-radius: 8px;
  max-height: 250px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-word;
}
table {
  border-collapse: collapse;
  width: 100%;
  margin-top: 10px;
  font-size: 13px;
}
th, td {
  padding: 8px;
  border-bottom: 1px solid #334155;
  text-align: left;
}
th { color: #94a3b8; }
img.preview-thumb {
  max-width: 80px;
  margin: 4px;
  border-radius: 6px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}
</style>
</head>
<body>
  <h1>XLS/XLSX ↔ CSV ↔ JSON ↔ PDF/Image Converter</h1>
  <div class="container">
    <div class="drop-zone" id="dropZone">
      <p id="fileLabel">Drop or Choose File(s) (.xls, .xlsx, .csv, .pdf, .png, .jpg)</p>
      <input type="file" id="fileInput" accept=".xls,.xlsx,.csv,.pdf,.png,.jpg,.jpeg" multiple style="display:none">
      <button id="chooseBtn">Choose File(s)</button>
    </div>

    <div style="text-align:center;margin-top:10px;">
      <button id="toCSV" disabled>Convert to CSV</button>
      <button id="toJSON" disabled>Convert to JSON</button>
      <button id="imgToPDF">Images → PDF</button>
      <button id="pdfToImg">PDF → Images</button>
      <button id="downloadBtn" disabled>Download</button>
    </div>

    <div id="preview"></div>
    <pre id="output">Output (JSON/CSV/PDF/Image) will appear here...</pre>
  </div>

<script>
const fileInput = document.getElementById("fileInput");
const dropZone = document.getElementById("dropZone");
const fileLabel = document.getElementById("fileLabel");
const chooseBtn = document.getElementById("chooseBtn");
const toCSV = document.getElementById("toCSV");
const toJSON = document.getElementById("toJSON");
const imgToPDF = document.getElementById("imgToPDF");
const pdfToImg = document.getElementById("pdfToImg");
const downloadBtn = document.getElementById("downloadBtn");
const preview = document.getElementById("preview");
const output = document.getElementById("output");

let fileData = "";
let fileName = "";
let csvData = "";
let jsonData = "";

// === Drag and Drop ===
dropZone.addEventListener("dragover", e => {
  e.preventDefault();
  dropZone.classList.add("dragover");
});
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
dropZone.addEventListener("drop", e => {
  e.preventDefault();
  dropZone.classList.remove("dragover");
  handleFiles(e.dataTransfer.files);
});

chooseBtn.addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", e => handleFiles(e.target.files));

// === File Handling ===
function handleFiles(files) {
  if (!files || files.length === 0) return;
  fileName = files[0].name;
  fileLabel.textContent = `${files.length} file(s) loaded`;

  // Show thumbnails for images
  const imageFiles = Array.from(files).filter(f => f.type.startsWith("image/"));
  if (imageFiles.length > 0) {
    preview.innerHTML = imageFiles.map(f => `<img src="${URL.createObjectURL(f)}" class="preview-thumb">`).join("");
    output.textContent = "Image(s) loaded. Ready to convert to PDF.";
  } else if (files[0].name.endsWith(".csv")) {
    const reader = new FileReader();
    reader.onload = e => {
      fileData = e.target.result;
      previewCSV(fileData);
      enableButtons();
    };
    reader.readAsText(files[0]);
  } else if (files[0].name.match(/\.(xls|xlsx)$/)) {
    const reader = new FileReader();
    reader.onload = e => {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: "array", dense: true });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      csvData = XLSX.utils.sheet_to_csv(sheet);
      previewCSV(csvData);
      fileData = csvData;
      enableButtons();
    };
    reader.readAsArrayBuffer(files[0]);
  } else if (files[0].name.endsWith(".pdf")) {
    output.textContent = "PDF loaded. You can now convert it to images.";
  }
}

function enableButtons() {
  toCSV.disabled = false;
  toJSON.disabled = false;
}

// === Preview CSV in table ===
function previewCSV(csvText) {
  const parsed = Papa.parse(csvText, { skipEmptyLines: true });
  const data = parsed.data.slice(0, 20);
  let html = "<table>";
  data.forEach((row, i) => {
    html += "<tr>";
    row.forEach(cell => {
      html += i === 0 ? `<th>${cell}</th>` : `<td>${cell}</td>`;
    });
    html += "</tr>";
  });
  html += "</table>";
  preview.innerHTML = html;
  output.textContent = "File loaded successfully!";
}

// === Convert to CSV ===
toCSV.addEventListener("click", () => {
  downloadBtn.disabled = false;
  downloadBtn.textContent = "Download CSV";
  downloadBtn.onclick = () => download(fileData, "text/csv", replaceExt(fileName, ".csv"));
  output.textContent = fileData;
});

// === Convert to JSON ===
toJSON.addEventListener("click", () => {
  const parsed = Papa.parse(fileData, { header: true, skipEmptyLines: true });
  jsonData = JSON.stringify(parsed.data, null, 2);
  output.textContent = jsonData;
  downloadBtn.disabled = false;
  downloadBtn.textContent = "Download JSON";
  downloadBtn.onclick = () => download(jsonData, "application/json", replaceExt(fileName, ".json"));
});

// === Multiple Images → One PDF ===
imgToPDF.addEventListener("click", async () => {
  const imgFiles = Array.from(fileInput.files).filter(f => f.type.startsWith("image/"));
  if (imgFiles.length === 0) return alert("Please choose one or more image files first!");

  const pdfDoc = await PDFLib.PDFDocument.create();

  for (const imgFile of imgFiles) {
    const arrayBuffer = await imgFile.arrayBuffer();
    const image = imgFile.type === "image/png"
      ? await pdfDoc.embedPng(arrayBuffer)
      : await pdfDoc.embedJpg(arrayBuffer);

    const page = pdfDoc.addPage([image.width, image.height]);
    page.drawImage(image, { x: 0, y: 0, width: image.width, height: image.height });
  }

  const pdfBytes = await pdfDoc.save();
  download(new Blob([pdfBytes]), "application/pdf", "merged_images.pdf");
  output.textContent = `✅ ${imgFiles.length} image(s) combined into a single PDF successfully!`;
});

// === PDF → Images ===
pdfToImg.addEventListener("click", async () => {
  const pdfFile = fileInput.files[0];
  if (!pdfFile || !pdfFile.name.endsWith(".pdf")) return alert("Please choose a PDF file first!");

  const pdfData = await pdfFile.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: pdfData }).promise;

  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const viewport = page.getViewport({ scale: 2 });
    const canvas = document.createElement("canvas");
    const context = canvas.getContext("2d");
    canvas.height = viewport.height;
    canvas.width = viewport.width;
    await page.render({ canvasContext: context, viewport }).promise;
    const imgData = canvas.toDataURL("image/png");
    const link = document.createElement("a");
    link.href = imgData;
    link.download = replaceExt(pdfFile.name, `_page${i}.png`);
    link.click();
  }
  output.textContent = `✅ PDF converted to ${pdf.numPages} image(s) successfully!`;
});

// === Download Helper ===
function download(content, mime, name) {
  const blob = content instanceof Blob ? content : new Blob([content], { type: mime });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = name;
  link.click();
  URL.revokeObjectURL(link.href);
}

function replaceExt(name, ext) {
  return name.replace(/\.[^/.]+$/, "") + ext;
}
</script>
</body>
</html>
