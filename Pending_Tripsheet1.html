<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚗 Vehicle merge · excel upload & table</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f0f4fa 0%, #e6ecf5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3), inset 0 1px 2px rgba(255,255,255,0.8);
            width: min(1300px, 98%);
            padding: 2rem 2rem 2.2rem;
            border: 1px solid rgba(255,255,255,0.5);
            transition: all 0.2s;
        }

        h1 {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 2.2rem;
            letter-spacing: -0.02em;
            color: #11212e;
            margin-bottom: 1rem;
            padding-left: 0.5rem;
            border-left: 8px solid #2b6c9e;
        }
        h1 i { color: #1e4b6e; font-size: 2rem; }

        .sub {
            color: #2c455b;
            margin-left: 1rem;
            margin-bottom: 2rem;
            font-weight: 400;
            font-size: 1.05rem;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #e1e9f2b3;
            padding: 0.6rem 1.4rem;
            border-radius: 60px;
            width: fit-content;
            backdrop-filter: blur(2px);
        }

        .upload-card {
            background: white;
            border-radius: 2rem;
            padding: 1.6rem 2rem;
            margin: 1.5rem 0 2rem 0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 18px -6px rgba(0,32,64,0.2);
            border: 1px solid rgba(255,255,255,0.7);
        }
        .file-label {
            background: #1a3d5c;
            color: white;
            padding: 0.9rem 2rem;
            border-radius: 50px;
            font-weight: 500;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid #30658a;
            box-shadow: 0 8px 14px -8px #102433;
        }
        .file-label i { font-size: 1.4rem; }
        .file-label:hover { background: #12344d; transform: scale(1.02); border-color: #5787af; }
        #fileInput { display: none; }

        .upload-hint {
            color: #2f4b6b;
            background: #deeaf6;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            font-size: 0.95rem;
        }
        .upload-hint i { margin-right: 8px; color: #136b5e; }

        /* ===== FILTER CARD (new) ===== */
        .filter-card {
            background: white;
            border-radius: 2rem;
            padding: 1.4rem 2rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 18px -6px rgba(0,32,64,0.15);
            border: 1px solid rgba(255,255,255,0.7);
            display: none;
        }
        .filter-card.visible { display: block; }

        .filter-top {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1rem;
            font-weight: 600;
            font-size: 1rem;
            color: #11212e;
        }
        .filter-top i { color: #2b6c9e; }

        .filter-search {
            width: 100%;
            border: 1.5px solid #c5d8ea;
            border-radius: 50px;
            padding: 0.55rem 1.2rem;
            font-size: 0.93rem;
            color: #122b3c;
            outline: none;
            margin-bottom: 0.9rem;
            transition: border-color 0.15s;
            font-family: 'Inter', sans-serif;
        }
        .filter-search:focus { border-color: #2b6c9e; }

        .vehicle-checkboxes {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            max-height: 160px;
            overflow-y: auto;
            margin-bottom: 1rem;
            padding: 2px;
        }
        .vehicle-checkboxes::-webkit-scrollbar { width: 5px; }
        .vehicle-checkboxes::-webkit-scrollbar-thumb { background: #c5d8ea; border-radius: 3px; }

        .vcheck-label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #f0f6fc;
            border: 1.5px solid #c5d8ea;
            border-radius: 50px;
            padding: 0.35rem 0.9rem;
            font-size: 0.85rem;
            color: #1a3d5c;
            cursor: pointer;
            transition: all 0.12s;
            user-select: none;
        }
        .vcheck-label:hover { border-color: #2b6c9e; background: #deeaf6; }
        .vcheck-label input { accent-color: #2b6c9e; width: 14px; height: 14px; cursor: pointer; }
        .vcheck-label.checked { background: #deeaf6; border-color: #2b6c9e; color: #0d3b55; font-weight: 600; }

        .filter-actions {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        .btn-apply {
            background: #1d694b;
            color: white;
            border: none;
            padding: 0.7rem 1.8rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.15s;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 4px 12px -4px rgba(29,105,75,0.4);
        }
        .btn-apply:hover { background: #155a40; transform: translateY(-1px); }

        .btn-sel-all, .btn-clear-all {
            background: #f0f6fc;
            color: #1a3d5c;
            border: 1.5px solid #c5d8ea;
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.12s;
            font-family: 'Inter', sans-serif;
        }
        .btn-sel-all:hover, .btn-clear-all:hover { border-color: #2b6c9e; background: #deeaf6; }

        .sel-count { margin-left: auto; font-size: 0.85rem; color: #4a6b85; }
        .sel-count b { color: #1a3d5c; }
        /* ===== END FILTER CARD ===== */

        .action-bar {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin: 1.8rem 0 1rem 0;
            flex-wrap: wrap;
        }
        .btn {
            border: none;
            background: white;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            box-shadow: 0 8px 16px -10px #1f3b4e;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid rgba(72, 119, 157, 0.3);
            color: #153e58;
        }
        .btn i { font-size: 1.3rem; }
        .btn:hover { background: #f0f8ff; border-color: #517f9f; transform: translateY(-2px); }
        .btn-excel { background: #1d694b; color: white; border-color: #116b4a; }
        .btn-excel:hover { background: #155a40; }
        .btn-image { background: #354f6d; color: white; border-color: #28445c; }
        .btn-image:hover { background: #223b54; }

        .table-wrapper {
            background: #ffffffd9;
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 1.8rem 1rem 1rem 1rem;
            box-shadow: inset 0 2px 4px #0000000d, 0 20px 30px -12px #1e3f5a;
            border: 1px solid #ffffff;
            overflow-x: auto;
            margin-top: 1.5rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 1.8rem;
            background: transparent;
            font-size: 0.98rem;
            min-width: 680px;
        }

        thead tr { background: #1f3b4f; color: white; border-radius: 20px 20px 0 0; }
        th {
            padding: 1.2rem 1rem;
            font-weight: 600;
            font-size: 1.05rem;
            letter-spacing: 0.3px;
            text-align: left;
        }
        th:first-child { border-top-left-radius: 1.4rem; }
        th:last-child { border-top-right-radius: 1.4rem; }

        td {
            padding: 1rem 1rem;
            background: white;
            border-bottom: 1px solid #d7e2ec;
            color: #122b3c;
            vertical-align: middle;
        }
        td.vehicle-cell {
            background-color: #eaf1fa;
            font-weight: 600;
            color: #0d3b55;
            border-right: 2px solid #a3c0da;
            box-shadow: 0 0 0 1px #edf5ff;
            font-size: 1.05rem;
        }
        td:not(.vehicle-cell) { background-color: #fefefe; }
        tr:hover td { background-color: #f4faff; }
        tr:hover td.vehicle-cell { background-color: #deecfd; }

        .no-data {
            text-align: center;
            padding: 4rem 1rem;
            color: #5d7388;
            font-style: italic;
            background: #f2f8ff;
            border-radius: 1rem;
        }
        .no-data i { font-size: 3rem; opacity: 0.5; margin-bottom: 0.5rem; }

        #captureArea { display: flex; flex-direction: column; }

        @media (max-width: 650px) {
            .glass-panel { padding: 1.2rem; }
            .upload-card { flex-direction: column; align-items: start; gap: 1rem; }
        }
    </style>
</head>
<body>
    <div class="glass-panel">
        <h1>
            <i class="fas fa-merge"></i>
            Vehicle merge studio
        </h1>
        <div class="sub">
            <i class="fas fa-file-excel"></i> upload excel · same vehicles merge · best table
        </div>

        <!-- upload section -->
        <div class="upload-card">
            <label for="fileInput" class="file-label">
                <i class="fas fa-cloud-upload-alt"></i> Choose Excel file
            </label>
            <input type="file" id="fileInput" accept=".xlsx, .xls, .csv">
            <span class="upload-hint"><i class="fas fa-info-circle"></i> columns: Vehicle, (any) → merge by Vehicle</span>
        </div>

        <!-- ===== VEHICLE FILTER CARD (new) ===== -->
        <div class="filter-card" id="filterCard">
            <div class="filter-top">
                <i class="fas fa-filter"></i> Filter by Vehicle
            </div>
            <input type="text" class="filter-search" id="filterSearch" placeholder="Search vehicle name...">
            <div class="vehicle-checkboxes" id="vehicleCheckboxes"></div>
            <div class="filter-actions">
                <button class="btn-apply" id="applyFilterBtn">
                    <i class="fas fa-check"></i> Apply Filter
                </button>
                <button class="btn-sel-all" id="selAllBtn">Select All</button>
                <button class="btn-clear-all" id="clearAllBtn">Clear All</button>
                <span class="sel-count"><b id="selCountNum">0</b> selected</span>
            </div>
        </div>
        <!-- ===== END FILTER CARD ===== -->

        <!-- download action buttons -->
        <div class="action-bar">
            <button class="btn btn-image" id="downloadImageBtn"><i class="fas fa-camera"></i> Download as Image</button>
            <button class="btn btn-excel" id="downloadExcelBtn"><i class="fas fa-file-excel"></i> Export merged Excel</button>
        </div>

        <!-- table wrapper -->
        <div id="captureArea" class="table-wrapper">
            <table id="mergedTable">
                <thead>
                    <tr id="tableHeaderRow"></tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="10" class="no-data">
                            <i class="fas fa-car-side"></i><br>
                            No data yet. Upload an excel file.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <small style="display: block; margin-top: 0.8rem; color: #3f5b74;"><i class="far fa-gem"></i> Rows with same vehicle name merge automatically. Other columns show combined (unique values).</small>
    </div>

    <script>
        (function() {
            let currentHeaders = [];
            let mergedRows = [];
            let allVehicles = [];
            let activeVehicles = new Set(); // currently applied filter

            const fileInput         = document.getElementById('fileInput');
            const tableHead         = document.querySelector('#mergedTable thead tr');
            const tableBody         = document.getElementById('tableBody');
            const downloadImageBtn  = document.getElementById('downloadImageBtn');
            const downloadExcelBtn  = document.getElementById('downloadExcelBtn');

            // filter elements
            const filterCard        = document.getElementById('filterCard');
            const filterSearch      = document.getElementById('filterSearch');
            const vehicleCheckboxes = document.getElementById('vehicleCheckboxes');
            const applyFilterBtn    = document.getElementById('applyFilterBtn');
            const selAllBtn         = document.getElementById('selAllBtn');
            const clearAllBtn       = document.getElementById('clearAllBtn');
            const selCountNum       = document.getElementById('selCountNum');

            // ---- escape helper ----
            function escapeHtml(unsafe) {
                if (unsafe === undefined || unsafe === null) return '';
                return String(unsafe).replace(/[&<>"]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    if (m === '"') return '&quot;';
                    return m;
                });
            }

            // ---- render table with given rows ----
            function renderTable(rows) {
                if (!currentHeaders.length || !rows || rows.length === 0) {
                    tableHead.innerHTML = '';
                    tableBody.innerHTML = `<tr><td colspan="10" class="no-data"><i class="fas fa-car-side"></i><br>No data yet. Upload an excel file.</td></tr>`;
                    return;
                }
                let headerHtml = '';
                currentHeaders.forEach(h => { headerHtml += `<th>${escapeHtml(h)}</th>`; });
                tableHead.innerHTML = headerHtml;

                let tbodyHtml = '';
                rows.forEach(row => {
                    tbodyHtml += '<tr>';
                    currentHeaders.forEach(header => {
                        let displayValue = row[header] !== undefined ? row[header] : '';
                        if (Array.isArray(displayValue)) displayValue = displayValue.join(', ');
                        else if (displayValue === null) displayValue = '';
                        const vehicleClass = (header === 'Vehicle') ? 'class="vehicle-cell"' : '';
                        tbodyHtml += `<td ${vehicleClass}>${escapeHtml(displayValue)}</td>`;
                    });
                    tbodyHtml += '</tr>';
                });
                tableBody.innerHTML = tbodyHtml;
            }

            // ---- merge rows by vehicle ----
            function mergeRowsByVehicle(rows, headers) {
                if (!rows.length) return [];
                const vehicleMap = new Map();
                rows.forEach(row => {
                    const vehicleVal = row['Vehicle'] ? row['Vehicle'].toString().trim() : '';
                    const key = vehicleVal || '__EMPTY_VEH__';
                    if (!vehicleMap.has(key)) {
                        const newRow = {};
                        headers.forEach(h => {
                            if (h === 'Vehicle') { newRow[h] = vehicleVal; }
                            else {
                                const val = row[h];
                                newRow[h] = (val !== undefined && val !== null && val !== '') ? [val] : [];
                            }
                        });
                        vehicleMap.set(key, newRow);
                    } else {
                        const existing = vehicleMap.get(key);
                        headers.forEach(h => {
                            if (h === 'Vehicle') return;
                            const currentVal = row[h];
                            if (currentVal !== undefined && currentVal !== null && currentVal !== '') {
                                if (!Array.isArray(existing[h])) existing[h] = existing[h] ? [existing[h]] : [];
                                if (!existing[h].includes(currentVal)) existing[h].push(currentVal);
                            }
                        });
                    }
                });
                const mergedArray = [];
                for (let [key, rowObj] of vehicleMap.entries()) {
                    if (key === '__EMPTY_VEH__') rowObj['Vehicle'] = '';
                    mergedArray.push(rowObj);
                }
                return mergedArray;
            }

            // ---- build filter checkboxes ----
            function buildCheckboxes(query) {
                query = (query || '').toLowerCase();
                vehicleCheckboxes.innerHTML = '';
                allVehicles
                    .filter(v => v.toLowerCase().includes(query))
                    .forEach(v => {
                        const isChecked = activeVehicles.has(v);
                        const label = document.createElement('label');
                        label.className = 'vcheck-label' + (isChecked ? ' checked' : '');
                        label.innerHTML = `<input type="checkbox" value="${escapeHtml(v)}" ${isChecked ? 'checked' : ''}> ${escapeHtml(v)}`;
                        const cb = label.querySelector('input');
                        cb.addEventListener('change', () => {
                            if (cb.checked) { activeVehicles.add(v); label.classList.add('checked'); }
                            else { activeVehicles.delete(v); label.classList.remove('checked'); }
                            updateSelCount();
                        });
                        vehicleCheckboxes.appendChild(label);
                    });
                updateSelCount();
            }

            function updateSelCount() {
                selCountNum.textContent = activeVehicles.size;
            }

            // ---- get filtered rows ----
            function getFilteredRows() {
                if (activeVehicles.size === 0 || activeVehicles.size === allVehicles.length) return mergedRows;
                return mergedRows.filter(r => activeVehicles.has(r['Vehicle']));
            }

            // ---- process excel ----
            function processExcel(data) {
                try {
                    const workbook = XLSX.read(data, { type: 'binary' });
                    const firstSheet = workbook.SheetNames[0];
                    const sheet = workbook.Sheets[firstSheet];
                    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
                    if (rows.length < 1) { alert('Excel file seems empty'); return; }

                    let headers = rows[0].map(h => (h || '').toString().trim());
                    if (!headers.includes('Vehicle')) {
                        alert('Warning: "Vehicle" column not found. Using first column as Vehicle.');
                        if (headers.length > 0) headers[0] = 'Vehicle';
                        else { alert('no columns'); return; }
                    }

                    const rowObjects = [];
                    for (let i = 1; i < rows.length; i++) {
                        const row = rows[i];
                        if (!row || row.length === 0) continue;
                        const obj = {};
                        headers.forEach((h, idx) => { obj[h] = row[idx] !== undefined ? row[idx] : ''; });
                        rowObjects.push(obj);
                    }
                    if (rowObjects.length === 0) { alert('No data rows found.'); return; }

                    currentHeaders = headers.slice();
                    mergedRows = mergeRowsByVehicle(rowObjects, headers);

                    // populate vehicle list — all selected by default
                    allVehicles = mergedRows.map(r => r['Vehicle']).filter(Boolean);
                    activeVehicles = new Set(allVehicles);

                    filterCard.classList.add('visible');
                    filterSearch.value = '';
                    buildCheckboxes('');
                    renderTable(mergedRows);

                } catch (e) {
                    alert('Error parsing excel: ' + e.message);
                    console.error(e);
                }
            }

            // ---- file input ----
            fileInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(loadEvent) { processExcel(loadEvent.target.result); };
                reader.readAsBinaryString(file);
            });

            // ---- filter search ----
            filterSearch.addEventListener('input', function() { buildCheckboxes(filterSearch.value); });

            // ---- select all (visible) ----
            selAllBtn.addEventListener('click', function() {
                const query = filterSearch.value.toLowerCase();
                allVehicles.filter(v => v.toLowerCase().includes(query)).forEach(v => activeVehicles.add(v));
                buildCheckboxes(filterSearch.value);
            });

            // ---- clear all (visible) ----
            clearAllBtn.addEventListener('click', function() {
                const query = filterSearch.value.toLowerCase();
                allVehicles.filter(v => v.toLowerCase().includes(query)).forEach(v => activeVehicles.delete(v));
                buildCheckboxes(filterSearch.value);
            });

            // ---- apply filter ----
            applyFilterBtn.addEventListener('click', function() {
                renderTable(getFilteredRows());
            });

            // ---- image download ----
            downloadImageBtn.addEventListener('click', function() {
                const element = document.getElementById('captureArea');
                if (!element) return;
                const rows = getFilteredRows();
                if (!currentHeaders.length || rows.length === 0) {
                    alert('No data to capture. Upload an excel first.');
                    return;
                }

                // Temporarily replace tbody with only filtered rows for capture
                const originalTbody = tableBody.innerHTML;
                let tempHtml = '';
                rows.forEach(row => {
                    tempHtml += '<tr>';
                    currentHeaders.forEach(header => {
                        let displayValue = row[header] !== undefined ? row[header] : '';
                        if (Array.isArray(displayValue)) displayValue = displayValue.join(', ');
                        else if (displayValue === null) displayValue = '';
                        const vehicleClass = (header === 'Vehicle') ? 'class="vehicle-cell"' : '';
                        tempHtml += `<td ${vehicleClass}>${escapeHtml(displayValue)}</td>`;
                    });
                    tempHtml += '</tr>';
                });
                tableBody.innerHTML = tempHtml;

                html2canvas(element, {
                    scale: 1.8,
                    backgroundColor: '#ffffff',
                    logging: false,
                    allowTaint: false,
                    useCORS: true
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = 'merged-vehicle-table.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    // Restore original tbody
                    tableBody.innerHTML = originalTbody;
                }).catch(err => {
                    tableBody.innerHTML = originalTbody;
                    alert('Screenshot failed: ' + err);
                });
            });

            // ---- excel download ----
            downloadExcelBtn.addEventListener('click', function() {
                const rows = getFilteredRows();
                if (!currentHeaders.length || rows.length === 0) {
                    alert('No merged data to export. Upload excel first.');
                    return;
                }
                const exportRows = [currentHeaders.slice()];
                rows.forEach(row => {
                    exportRows.push(currentHeaders.map(h => {
                        let val = row[h];
                        if (Array.isArray(val)) val = val.join(', ');
                        else if (val === undefined || val === null) val = '';
                        return val;
                    }));
                });
                const wb = XLSX.utils.book_new();
                const ws = XLSX.utils.aoa_to_sheet(exportRows);
                XLSX.utils.book_append_sheet(wb, ws, 'Merged vehicles');
                XLSX.writeFile(wb, 'merged_vehicles.xlsx');
            });

        })();
    </script>
</body>
</html>
